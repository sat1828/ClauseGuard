server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy everything under /api/ straight to the backend container.
    # No path rewriting — the backend's own routes already start with /api/,
    # so the URI nginx received is exactly what the backend expects.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Uploads can be large-ish and analysis takes a while to enqueue —
        # give this more room than nginx's stingy defaults.
        client_max_body_size 30M;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    # SPA routing: any unmatched path falls back to index.html so React
    # Router handles it client-side instead of nginx 404-ing on a refresh
    # at e.g. /documents/abc123.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively; index.html itself is never
    # cached so deploys take effect immediately.
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
