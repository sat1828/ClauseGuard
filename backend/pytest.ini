[pytest]
# ClauseGuard pytest configuration
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbose output with short traceback format
addopts = -v --tb=short

# Filter warnings that clutter test output
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:langsmith
