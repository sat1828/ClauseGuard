# ClauseGuard Alembic Configuration
# =====================================
# Usage:
#   alembic revision --autogenerate -m "description"  # create migration
#   alembic upgrade head                               # apply all migrations
#   alembic downgrade -1                              # rollback one migration
#   alembic history                                   # show migration history

[alembic]
# Path to the migrations directory
script_location = migrations

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration file timestamps
timezone = UTC

# Truncate long commit messages in file names
truncate_slug_length = 40

# SQLAlchemy URL — overridden programmatically in migrations/env.py
# from the DATABASE_URL_SYNC environment variable. This placeholder
# ensures Alembic can parse the config file without erroring.
sqlalchemy.url = postgresql://user:pass@localhost/clauseguard

[post_write_hooks]
# Optional: run Black on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
