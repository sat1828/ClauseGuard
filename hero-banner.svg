<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" width="900" height="320">
  <defs>
    <style>
      @keyframes scanline {
        0%   { transform: translateY(0px);   opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateY(180px); opacity: 0; }
      }
      @keyframes fadeSlideUp {
        0%   { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }
      @keyframes countUp {
        0%   { opacity: 0; }
        30%  { opacity: 1; }
        100% { opacity: 1; }
      }
      @keyframes barFill {
        0%   { width: 0px; }
        100% { width: var(--w); }
      }
      @keyframes badgePop {
        0%   { transform: scale(0.6); opacity: 0; }
        70%  { transform: scale(1.08); }
        100% { transform: scale(1);   opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0; }
      }
      @keyframes shimmer {
        0%   { x: -200px; }
        100% { x: 900px; }
      }
      .t-logo   { font-family: 'Georgia', serif; font-size: 22px; font-weight: bold; fill: #0f172a; }
      .t-tag    { font-family: 'Courier New', monospace; font-size: 10px; fill: #64748b; letter-spacing: 2px; }
      .t-hero   { font-family: 'Georgia', serif; font-size: 34px; font-weight: bold; fill: #0f172a; }
      .t-heroem { font-family: 'Georgia', serif; font-size: 34px; font-weight: bold; fill: #dc2626; }
      .t-sub    { font-family: 'Georgia', serif; font-size: 13px; fill: #475569; }
      .t-stat   { font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; fill: #0f172a; }
      .t-stlbl  { font-family: 'Courier New', monospace; font-size: 9px; fill: #94a3b8; letter-spacing: 1px; }
      .t-badge  { font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold; }
      .t-pill   { font-family: 'Courier New', monospace; font-size: 9px; fill: #334155; }
    </style>
    <!-- Shimmer gradient for scan effect -->
    <linearGradient id="scan-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#dc2626" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#dc2626" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <clipPath id="doc-clip">
      <rect x="570" y="60" width="220" height="210" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg-grad)"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
    <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="320" fill="url(#grid)" opacity="0.6"/>

  <!-- LEFT: Logo + text -->
  <g style="animation: fadeSlideUp 0.6s ease both; animation-delay: 0.1s">
    <!-- Shield icon -->
    <rect x="48" y="34" width="32" height="32" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="64" y="56" text-anchor="middle" font-size="16" fill="#dc2626">⚖</text>
    <text x="88" y="56" class="t-logo">ClauseGuard</text>
  </g>

  <g style="animation: fadeSlideUp 0.6s ease both; animation-delay: 0.25s">
    <text x="48" y="90" class="t-tag">AI CONTRACT INTELLIGENCE</text>
  </g>

  <g style="animation: fadeSlideUp 0.6s ease both; animation-delay: 0.4s">
    <text x="48" y="136" class="t-hero">Read every clause.</text>
    <text x="48" y="175" class="t-hero">Flag every </text>
    <text x="222" y="175" class="t-heroem">risk.</text>
    <text x="48" y="214" class="t-hero">In 35 seconds.</text>
  </g>

  <g style="animation: fadeSlideUp 0.7s ease both; animation-delay: 0.7s">
    <text x="48" y="243" class="t-sub">Upload any contract. Get every dangerous clause</text>
    <text x="48" y="259" class="t-sub">scored, explained, and rewritten — before you sign.</text>
  </g>

  <!-- CTA buttons -->
  <g style="animation: fadeSlideUp 0.6s ease both; animation-delay: 0.9s">
    <rect x="48" y="272" width="148" height="34" rx="6" fill="#0f172a"/>
    <text x="122" y="293" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#f8fafc">↑ Upload contract</text>
    <rect x="206" y="272" width="120" height="34" rx="6" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <text x="266" y="293" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#475569">View demo →</text>
  </g>

  <!-- Divider -->
  <line x1="390" y1="40" x2="390" y2="290" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- STATS column -->
  <g style="animation: countUp 0.6s ease both; animation-delay: 1.0s">
    <text x="430" y="100" class="t-stat">~93%</text>
    <text x="430" y="115" class="t-stlbl">TYPE DETECTION</text>
    <line x1="430" y1="124" x2="540" y2="124" stroke="#e2e8f0" stroke-width="1"/>
    <text x="430" y="150" class="t-stat">0.81</text>
    <text x="430" y="165" class="t-stlbl">CLAUSE F1 (CUAD)</text>
    <line x1="430" y1="174" x2="540" y2="174" stroke="#e2e8f0" stroke-width="1"/>
    <text x="430" y="200" class="t-stat">100%</text>
    <text x="430" y="215" class="t-stlbl">DETERMINISM</text>
    <line x1="430" y1="224" x2="540" y2="224" stroke="#e2e8f0" stroke-width="1"/>
    <text x="430" y="250" class="t-stat">30</text>
    <text x="430" y="265" class="t-stlbl">CLAUSE TYPES</text>
  </g>

  <!-- RIGHT: Animated contract document with scan -->
  <g style="animation: fadeSlideUp 0.7s ease both; animation-delay: 0.5s">
    <!-- Document shadow -->
    <rect x="574" y="64" width="220" height="210" rx="8" fill="#0f172a" opacity="0.08"/>
    <!-- Document body -->
    <rect x="570" y="60" width="220" height="210" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Document header bar -->
    <rect x="570" y="60" width="220" height="36" rx="8" fill="#f8fafc"/>
    <rect x="570" y="84" width="220" height="12" fill="#f8fafc"/>
    <circle cx="590" cy="78" r="5" fill="#fecaca"/>
    <circle cx="604" cy="78" r="5" fill="#fef08a"/>
    <circle cx="618" cy="78" r="5" fill="#bbf7d0"/>
    <text x="680" y="82" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">Employment Agreement</text>

    <!-- Doc lines (simulated text) -->
    <rect x="588" y="108" width="140" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="120" width="110" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="132" width="130" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="144" width="100" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="160" width="140" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="172" width="80" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="184" width="120" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="196" width="140" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="208" width="60" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="224" width="130" height="6" rx="2" fill="#f1f5f9"/>
    <rect x="588" y="236" width="100" height="6" rx="2" fill="#f1f5f9"/>

    <!-- Highlighted CRITICAL row -->
    <rect x="582" y="155" width="196" height="20" rx="3" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5"/>

    <!-- Scan line animation -->
    <rect x="570" y="96" width="220" height="32" fill="url(#scan-grad)" clip-path="url(#doc-clip)"
      style="animation: scanline 2.4s ease-in-out infinite; animation-delay: 1.2s; transform-box: fill-box; transform-origin: top center;"/>
  </g>

  <!-- Risk badges popping in -->
  <g style="animation: badgePop 0.5s cubic-bezier(.34,1.56,.64,1) both; animation-delay: 1.6s">
    <rect x="618" y="150" width="60" height="18" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="648" y="162" text-anchor="middle" class="t-badge" fill="#dc2626">CRITICAL</text>
  </g>
  <g style="animation: badgePop 0.5s cubic-bezier(.34,1.56,.64,1) both; animation-delay: 1.9s">
    <rect x="618" y="190" width="40" height="18" rx="4" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
    <text x="638" y="202" text-anchor="middle" class="t-badge" fill="#b45309">HIGH</text>
  </g>
  <g style="animation: badgePop 0.5s cubic-bezier(.34,1.56,.64,1) both; animation-delay: 2.1s">
    <rect x="618" y="228" width="50" height="18" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="643" y="240" text-anchor="middle" class="t-badge" fill="#1d4ed8">MEDIUM</text>
  </g>

  <!-- Score badge -->
  <g style="animation: badgePop 0.5s cubic-bezier(.34,1.56,.64,1) both; animation-delay: 2.3s">
    <rect x="683" y="150" width="36" height="18" rx="4" fill="#0f172a"/>
    <text x="701" y="162" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" font-weight="bold" fill="#f8fafc">9.2/10</text>
  </g>

  <!-- Live indicator -->
  <g style="animation: fadeSlideUp 0.5s ease both; animation-delay: 2.5s">
    <circle cx="578" cy="284" r="5" fill="#22c55e" style="animation: pulse 1.5s ease-in-out infinite; animation-delay: 2.5s"/>
    <text x="590" y="288" font-family="'Courier New',monospace" font-size="10" fill="#166534">Live — clauseguard.vercel.app</text>
  </g>

  <!-- Python / TS / Claude pill row -->
  <g style="animation: fadeSlideUp 0.6s ease both; animation-delay: 2.6s">
    <rect x="570" y="295" width="46" height="16" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="593" y="307" text-anchor="middle" class="t-pill">Python</text>
    <rect x="622" y="295" width="54" height="16" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="649" y="307" text-anchor="middle" class="t-pill">TypeScript</text>
    <rect x="682" y="295" width="42" height="16" rx="3" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5"/>
    <text x="703" y="307" text-anchor="middle" class="t-pill" fill="#dc2626">Claude</text>
    <rect x="730" y="295" width="56" height="16" rx="3" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.5"/>
    <text x="758" y="307" text-anchor="middle" class="t-pill" fill="#166534">Pinecone</text>
  </g>
</svg>
