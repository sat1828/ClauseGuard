<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" width="900" height="480">
  <defs>
    <style>
      @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
      @keyframes popIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
      @keyframes barGrow { from{width:0} to{width:var(--bw)} }
      @keyframes scoreCount { 0%{opacity:0} 40%{opacity:1} 100%{opacity:1} }
      @keyframes spin { to{stroke-dashoffset:0} }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .mono { font-family:'Courier New',monospace; }
      .serif { font-family:'Georgia',serif; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="900" height="480" fill="#f8fafc"/>

  <!-- Top nav -->
  <rect width="900" height="48" fill="white" stroke="#e2e8f0" stroke-width="0.5" style="animation:fadeUp 0.4s ease both"/>
  <rect x="16" y="12" width="24" height="24" rx="5" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5" style="animation:fadeUp 0.4s ease both"/>
  <text x="28" y="28" text-anchor="middle" font-size="13" fill="#dc2626" style="animation:fadeUp 0.4s ease both">⚖</text>
  <text x="48" y="29" font-family="'Georgia',serif" font-size="14" font-weight="bold" fill="#0f172a" style="animation:fadeUp 0.4s ease both">ClauseGuard</text>

  <rect x="130" y="14" width="96" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.5" style="animation:fadeUp 0.4s ease both"/>
  <circle cx="143" cy="24" r="4" fill="#22c55e" style="animation:pulse 1.5s infinite"/>
  <text x="198" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#166534" style="animation:fadeUp 0.4s ease both">Analysis done · 34s</text>

  <text x="636" y="29" font-family="'Courier New',monospace" font-size="10" fill="#94a3b8" style="animation:fadeUp 0.4s ease both">employment_agreement.pdf · 14 pages</text>
  <rect x="776" y="14" width="64" height="20" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5" style="animation:fadeUp 0.4s ease both"/>
  <text x="808" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#475569" style="animation:fadeUp 0.4s ease both">Export PDF</text>
  <rect x="844" y="14" width="48" height="20" rx="4" fill="#0f172a" style="animation:fadeUp 0.4s ease both"/>
  <text x="868" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="white" style="animation:fadeUp 0.4s ease both">Ask AI</text>

  <!-- LEFT SIDEBAR -->
  <!-- Risk summary card -->
  <rect x="12" y="60" width="192" height="170" rx="8" fill="white" stroke="#e2e8f0" stroke-width="0.5" style="animation:popIn 0.5s ease both; animation-delay:0.3s"/>
  <text x="24" y="80" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8" letter-spacing="1" style="animation:fadeUp 0.5s ease both; animation-delay:0.3s">RISK OVERVIEW</text>

  <!-- Donut chart (animated stroke-dasharray) -->
  <circle cx="108" cy="148" r="44" fill="none" stroke="#f1f5f9" stroke-width="14" style="animation:fadeUp 0.5s ease both; animation-delay:0.5s"/>
  <!-- Critical (red) ~90deg = dasharray ~70 of 277 circumference -->
  <circle cx="108" cy="148" r="44" fill="none" stroke="#dc2626" stroke-width="14" stroke-linecap="butt"
    stroke-dasharray="0 277" transform="rotate(-90 108 148)"
    style="animation:fadeUp 0.1s ease both; animation-delay:0.7s">
    <animate attributeName="stroke-dasharray" from="0 277" to="69 208" dur="0.8s" begin="0.7s" fill="freeze"/>
  </circle>
  <!-- High (amber) ~120deg = 92 -->
  <circle cx="108" cy="148" r="44" fill="none" stroke="#f59e0b" stroke-width="14" stroke-linecap="butt"
    stroke-dasharray="0 277" stroke-dashoffset="-69" transform="rotate(-90 108 148)"
    style="animation:fadeUp 0.1s ease both; animation-delay:1.1s">
    <animate attributeName="stroke-dasharray" from="0 277" to="92 185" dur="0.7s" begin="1.1s" fill="freeze"/>
  </circle>
  <!-- Medium (blue) ~72deg = 55 -->
  <circle cx="108" cy="148" r="44" fill="none" stroke="#3b82f6" stroke-width="14" stroke-linecap="butt"
    stroke-dasharray="0 277" stroke-dashoffset="-161" transform="rotate(-90 108 148)"
    style="animation:fadeUp 0.1s ease both; animation-delay:1.5s">
    <animate attributeName="stroke-dasharray" from="0 277" to="55 222" dur="0.6s" begin="1.5s" fill="freeze"/>
  </circle>
  <!-- Low (green) ~36deg = 27 -->
  <circle cx="108" cy="148" r="44" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="butt"
    stroke-dasharray="0 277" stroke-dashoffset="-216" transform="rotate(-90 108 148)"
    style="animation:fadeUp 0.1s ease both; animation-delay:1.9s">
    <animate attributeName="stroke-dasharray" from="0 277" to="27 250" dur="0.5s" begin="1.9s" fill="freeze"/>
  </circle>
  <text x="108" y="144" text-anchor="middle" font-family="'Georgia',serif" font-size="22" font-weight="bold" fill="#0f172a">9</text>
  <text x="108" y="158" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#94a3b8">clauses</text>

  <!-- Legend -->
  <circle cx="24" cy="212" r="4" fill="#dc2626" style="animation:popIn 0.4s ease both; animation-delay:2.1s"/>
  <text x="33" y="216" font-family="'Courier New',monospace" font-size="10" fill="#334155" style="animation:fadeUp 0.4s ease both; animation-delay:2.1s">Critical · 2</text>
  <circle cx="100" cy="212" r="4" fill="#f59e0b" style="animation:popIn 0.4s ease both; animation-delay:2.2s"/>
  <text x="109" y="216" font-family="'Courier New',monospace" font-size="10" fill="#334155" style="animation:fadeUp 0.4s ease both; animation-delay:2.2s">High · 3</text>
  <circle cx="24" cy="228" r="4" fill="#3b82f6" style="animation:popIn 0.4s ease both; animation-delay:2.3s"/>
  <text x="33" y="232" font-family="'Courier New',monospace" font-size="10" fill="#334155" style="animation:fadeUp 0.4s ease both; animation-delay:2.3s">Medium · 3</text>
  <circle cx="100" cy="228" r="4" fill="#22c55e" style="animation:popIn 0.4s ease both; animation-delay:2.4s"/>
  <text x="109" y="232" font-family="'Courier New',monospace" font-size="10" fill="#334155" style="animation:fadeUp 0.4s ease both; animation-delay:2.4s">Low · 1</text>

  <!-- Missing clauses card -->
  <rect x="12" y="242" width="192" height="80" rx="8" fill="white" stroke="#e2e8f0" stroke-width="0.5" style="animation:popIn 0.5s ease both; animation-delay:0.5s"/>
  <text x="24" y="260" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8" letter-spacing="1">MISSING CLAUSES</text>
  <rect x="20" y="266" width="178" height="17" rx="3" fill="#fef2f2"/>
  <text x="30" y="278" font-family="'Courier New',monospace" font-size="9" fill="#dc2626">⚠ Governing Law not found</text>
  <rect x="20" y="286" width="178" height="17" rx="3" fill="#fffbeb"/>
  <text x="30" y="298" font-family="'Courier New',monospace" font-size="9" fill="#b45309">⚠ Dispute Resolution absent</text>

  <!-- Stats card -->
  <rect x="12" y="332" width="192" height="104" rx="8" fill="white" stroke="#e2e8f0" stroke-width="0.5" style="animation:popIn 0.5s ease both; animation-delay:0.6s"/>
  <text x="24" y="350" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8" letter-spacing="1">ANALYSIS STATS</text>
  <text x="24" y="369" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">Pages</text>
  <text x="192" y="369" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#334155">14</text>
  <text x="24" y="384" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">Chunks</text>
  <text x="192" y="384" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#334155">38</text>
  <text x="24" y="399" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">API cost</text>
  <text x="192" y="399" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#334155">~$0.22</text>
  <text x="24" y="414" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">Latency</text>
  <text x="192" y="414" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#22c55e">34s</text>
  <text x="24" y="429" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">Determinism</text>
  <text x="192" y="429" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#22c55e">100%</text>

  <!-- MAIN RISK CARDS -->
  <!-- Card 1: CRITICAL -->
  <rect x="216" y="60" width="672" height="116" rx="8" fill="white" stroke="#fca5a5" stroke-width="1" style="animation:fadeUp 0.5s ease both; animation-delay:0.6s"/>
  <rect x="216" y="60" width="4" height="116" rx="2" fill="#dc2626"/>
  <rect x="228" y="72" width="56" height="16" rx="3" fill="#fef2f2"/>
  <text x="256" y="84" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" font-weight="bold" fill="#dc2626">CRITICAL</text>
  <text x="292" y="84" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">Non-Compete Clause · §11.2 · Page 8</text>
  <text x="866" y="84" text-anchor="end" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#dc2626" style="animation:scoreCount 0.8s ease both; animation-delay:1.0s">9.2/10</text>
  <text x="228" y="108" font-family="'Georgia',serif" font-size="11" fill="#334155">You cannot work for any competitor, worldwide, for 5 years after leaving. "Competitor" is so</text>
  <text x="228" y="122" font-family="'Georgia',serif" font-size="11" fill="#334155">broadly defined it could cover your next employer — wherever in the world they operate.</text>
  <!-- 8-dim rubric bars -->
  <text x="228" y="142" font-family="'Courier New',monospace" font-size="8" fill="#94a3b8">SCOPE</text>
  <rect x="260" y="135" width="40" height="6" rx="2" fill="#fef2f2"/>
  <rect x="260" y="135" height="6" rx="2" fill="#dc2626"><animate attributeName="width" from="0" to="40" dur="0.6s" begin="1.2s" fill="freeze"/></rect>
  <text x="314" y="142" font-family="'Courier New',monospace" font-size="8" fill="#94a3b8">DURATION</text>
  <rect x="356" y="135" width="40" height="6" rx="2" fill="#fef2f2"/>
  <rect x="356" y="135" height="6" rx="2" fill="#dc2626"><animate attributeName="width" from="0" to="40" dur="0.6s" begin="1.3s" fill="freeze"/></rect>
  <text x="410" y="142" font-family="'Courier New',monospace" font-size="8" fill="#94a3b8">ASYMMETRY</text>
  <rect x="460" y="135" width="40" height="6" rx="2" fill="#fef2f2"/>
  <rect x="460" y="135" height="6" rx="2" fill="#dc2626"><animate attributeName="width" from="0" to="40" dur="0.6s" begin="1.4s" fill="freeze"/></rect>
  <text x="514" y="142" font-family="'Courier New',monospace" font-size="8" fill="#94a3b8">EXIT</text>
  <rect x="538" y="135" width="40" height="6" rx="2" fill="#fef2f2"/>
  <rect x="538" y="135" height="6" rx="2" fill="#dc2626"><animate attributeName="width" from="0" to="38" dur="0.6s" begin="1.5s" fill="freeze"/></rect>

  <!-- Action buttons -->
  <rect x="228" y="148" width="128" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="292" y="162" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#334155">View safer replacement →</text>
  <rect x="362" y="148" width="88" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="406" y="162" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#334155">Ask about this ↗</text>

  <!-- Card 2: HIGH -->
  <rect x="216" y="186" width="672" height="96" rx="8" fill="white" stroke="#fde68a" stroke-width="1" style="animation:fadeUp 0.5s ease both; animation-delay:0.9s"/>
  <rect x="216" y="186" width="4" height="96" rx="2" fill="#f59e0b"/>
  <rect x="228" y="196" width="38" height="16" rx="3" fill="#fffbeb"/>
  <text x="247" y="208" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" font-weight="bold" fill="#b45309">HIGH</text>
  <text x="275" y="208" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">Limitation of Liability · §14.1 · Page 11</text>
  <text x="866" y="208" text-anchor="end" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#b45309" style="animation:scoreCount 0.8s ease both; animation-delay:1.4s">7.4/10</text>
  <text x="228" y="228" font-family="'Georgia',serif" font-size="11" fill="#334155">Company liability capped at 30 days of fees. On an annual contract, your maximum recovery</text>
  <text x="228" y="242" font-family="'Georgia',serif" font-size="11" fill="#334155">in month 1 is effectively ₹0 — even if they breach a fundamental obligation.</text>
  <rect x="228" y="260" width="128" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="292" y="274" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#334155">View safer replacement →</text>

  <!-- Card 3: MEDIUM -->
  <rect x="216" y="292" width="672" height="80" rx="8" fill="white" stroke="#bfdbfe" stroke-width="1" style="animation:fadeUp 0.5s ease both; animation-delay:1.2s"/>
  <rect x="216" y="292" width="4" height="80" rx="2" fill="#3b82f6"/>
  <rect x="228" y="302" width="50" height="16" rx="3" fill="#eff6ff"/>
  <text x="253" y="314" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" font-weight="bold" fill="#1d4ed8">MEDIUM</text>
  <text x="288" y="314" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">IP Assignment · §9.3 · Page 7</text>
  <text x="866" y="314" text-anchor="end" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#1d4ed8">5.1/10</text>
  <text x="228" y="334" font-family="'Georgia',serif" font-size="11" fill="#334155">All work created "in connection with employment" assigned to company — including personal</text>
  <text x="228" y="348" font-family="'Georgia',serif" font-size="11" fill="#334155">time, personal equipment. "In connection" is not defined anywhere in the contract.</text>
  <rect x="228" y="358" width="128" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="292" y="372" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#334155">View safer replacement →</text>

  <!-- Accuracy footer bar -->
  <rect x="216" y="388" width="672" height="56" rx="8" fill="white" stroke="#e2e8f0" stroke-width="0.5" style="animation:fadeUp 0.5s ease both; animation-delay:1.5s"/>
  <text x="228" y="408" font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">BENCHMARK ACCURACY</text>
  <text x="228" y="432" font-family="'Courier New',monospace" font-size="10" fill="#334155">F1: <tspan fill="#22c55e">0.81</tspan>   ·   Type detection: <tspan fill="#22c55e">93%</tspan>   ·   Determinism: <tspan fill="#22c55e">100%</tspan>   ·   Latency: <tspan fill="#3b82f6">~35s</tspan>   ·   Cost/contract: <tspan fill="#94a3b8">$0.15–0.40</tspan>   ·   CUAD dataset (50 contracts)</text>
</svg>
