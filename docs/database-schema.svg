<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="d1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3F6B44"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#EEE9DC"/>
  <text x="60" y="52" font-size="26" font-weight="700" fill="#241C16">Database Schema</text>
  <text x="60" y="76" font-size="12.5" fill="#5C5040" font-family="Courier New, monospace">§ app/models.py, verbatim — 6 tables, every foreign key explicitly indexed</text>

  <!-- users -->
  <rect x="60" y="120" width="230" height="230" rx="10" fill="#FBF9F3" stroke="#7A2436" stroke-width="2.4"/>
  <rect x="60" y="120" width="230" height="34" rx="10" fill="#7A2436"/>
  <text x="76" y="143" font-size="14" font-weight="700" fill="#FBF9F3">users</text>
  <text x="76" y="172" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">id (uuid, pk)</text>
  <text x="76" y="190" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">email (unique, indexed)</text>
  <text x="76" y="208" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">hashed_password</text>
  <text x="76" y="226" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">plan, analyses_used/limit</text>
  <text x="76" y="244" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">stripe_customer_id</text>
  <text x="76" y="262" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">email_verified + token hash</text>
  <text x="76" y="280" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">password_reset_token hash</text>
  <text x="76" y="298" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">subscription_status</text>
  <text x="76" y="322" font-size="10.5" fill="#A85220">6 sensitive fields — every one</text>
  <text x="76" y="336" font-size="10.5" fill="#A85220">is a hash, never a raw secret</text>

  <!-- documents -->
  <rect x="360" y="120" width="230" height="290" rx="10" fill="#FBF9F3" stroke="#7A2436" stroke-width="2.4"/>
  <rect x="360" y="120" width="230" height="34" rx="10" fill="#7A2436"/>
  <text x="376" y="143" font-size="14" font-weight="700" fill="#FBF9F3">documents</text>
  <text x="376" y="172" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">id (uuid, pk)</text>
  <text x="376" y="190" font-size="11.5" fill="#7A2436" font-family="Courier New, monospace">user_id → users.id ●</text>
  <text x="376" y="208" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">filename, storage_key</text>
  <text x="376" y="226" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">status, error_code/message</text>
  <text x="376" y="244" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">overall_risk_score/label</text>
  <text x="376" y="262" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">page_count, word_count</text>
  <text x="376" y="280" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">used_ocr (bool)</text>
  <text x="376" y="298" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">clauses_total/processed/failed</text>
  <text x="376" y="316" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">partial_analysis, truncated</text>
  <text x="376" y="334" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">processing_started/completed_at</text>
  <text x="376" y="358" font-size="10.5" fill="#A85220">● = FK, explicitly indexed —</text>
  <text x="376" y="372" font-size="10.5" fill="#A85220">Postgres/SQLite don't do this</text>
  <text x="376" y="386" font-size="10.5" fill="#A85220">automatically</text>

  <!-- clauses -->
  <rect x="660" y="120" width="230" height="230" rx="10" fill="#FBF9F3" stroke="#7A2436" stroke-width="2.4"/>
  <rect x="660" y="120" width="230" height="34" rx="10" fill="#7A2436"/>
  <text x="676" y="143" font-size="14" font-weight="700" fill="#FBF9F3">clauses</text>
  <text x="676" y="172" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">id (uuid, pk)</text>
  <text x="676" y="190" font-size="11.5" fill="#7A2436" font-family="Courier New, monospace">document_id → documents.id ●</text>
  <text x="676" y="208" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">clause_index, raw_text</text>
  <text x="676" y="226" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">clause_type (24 taxonomy keys)</text>
  <text x="676" y="244" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">risk_score (1-10), risk_label</text>
  <text x="676" y="262" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">plain_english_explanation</text>
  <text x="676" y="280" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">suggested_safer_language</text>
  <text x="676" y="298" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">confidence_score (blended)</text>
  <text x="676" y="316" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">analysis_failed, failure_reason</text>

  <!-- document_flags -->
  <rect x="960" y="120" width="180" height="180" rx="10" fill="#FBF9F3" stroke="#7A2436" stroke-width="2.4"/>
  <rect x="960" y="120" width="180" height="34" rx="10" fill="#7A2436"/>
  <text x="976" y="143" font-size="13.5" font-weight="700" fill="#FBF9F3">document_flags</text>
  <text x="976" y="172" font-size="11" fill="#241C16" font-family="Courier New, monospace">id (uuid, pk)</text>
  <text x="976" y="190" font-size="11" fill="#7A2436" font-family="Courier New, monospace">document_id ●</text>
  <text x="976" y="208" font-size="11" fill="#241C16" font-family="Courier New, monospace">flag_type, severity</text>
  <text x="976" y="226" font-size="11" fill="#241C16" font-family="Courier New, monospace">summary</text>
  <text x="976" y="244" font-size="11" fill="#7A2436" font-family="Courier New, monospace">affected_clause_id ●</text>

  <!-- refresh_tokens -->
  <rect x="60" y="440" width="260" height="150" rx="10" fill="#FBF9F3" stroke="#3F6B44" stroke-width="2.4"/>
  <rect x="60" y="440" width="260" height="34" rx="10" fill="#3F6B44"/>
  <text x="76" y="463" font-size="14" font-weight="700" fill="#FBF9F3">refresh_tokens</text>
  <text x="76" y="492" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">id (uuid, pk)</text>
  <text x="76" y="510" font-size="11.5" fill="#3F6B44" font-family="Courier New, monospace">user_id → users.id ●</text>
  <text x="76" y="528" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">token_hash (unique, indexed)</text>
  <text x="76" y="546" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">expires_at, revoked</text>
  <text x="76" y="564" font-size="10.5" fill="#A85220">hashed like a password —</text>
  <text x="76" y="578" font-size="10.5" fill="#A85220">a DB leak ≠ a live session</text>

  <!-- stripe_events -->
  <rect x="360" y="440" width="260" height="120" rx="10" fill="#FBF9F3" stroke="#A97C2F" stroke-width="2.4"/>
  <rect x="360" y="440" width="260" height="34" rx="10" fill="#A97C2F"/>
  <text x="376" y="463" font-size="14" font-weight="700" fill="#241C16">stripe_events</text>
  <text x="376" y="492" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">id (Stripe's own event id, pk)</text>
  <text x="376" y="510" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">type, processed (bool)</text>
  <text x="376" y="528" font-size="11.5" fill="#241C16" font-family="Courier New, monospace">raw_payload (json)</text>
  <text x="376" y="548" font-size="10.5" fill="#A85220">pk on Stripe's event id = free</text>
  <text x="376" y="562" font-size="10.5" fill="#A85220">idempotency on webhook retries</text>

  <!-- relations -->
  <line x1="290" y1="230" x2="360" y2="230" stroke="#7A2436" stroke-width="2" marker-end="url(#d1)"/>
  <text x="298" y="222" font-size="10" fill="#7A2436">1 : many</text>
  <line x1="590" y1="230" x2="660" y2="230" stroke="#7A2436" stroke-width="2" marker-end="url(#d1)"/>
  <text x="598" y="222" font-size="10" fill="#7A2436">1 : many</text>
  <line x1="890" y1="200" x2="960" y2="200" stroke="#7A2436" stroke-width="2" marker-end="url(#d1)"/>
  <text x="895" y="192" font-size="10" fill="#7A2436">1 : many</text>
  <line x1="175" y1="350" x2="175" y2="440" stroke="#3F6B44" stroke-width="2" marker-end="url(#d1)"/>
  <text x="183" y="400" font-size="10" fill="#3F6B44">1 : many</text>

  <text x="60" y="650" font-size="12" fill="#5C5040" font-family="Courier New, monospace">Not shown: cascade deletes on every FK — deleting a user genuinely deletes their documents, clauses, flags, and sessions with them.</text>
</svg>
